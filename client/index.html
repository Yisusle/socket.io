 <!DOCTYPE html>
  <html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Sockect.io</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <h1>Chat con Sockect.io y NodeJS</h1>

    <div id="users" aria-live="polite"></div>
    <div id="messages"></div>
    <div id="typing-indicator"></div>

    <div id="reply-preview">
      <span id="reply-preview-text"></span>
      <button onclick="cancelReply()">✕</button>
    </div>

    <div id="media-panel">
      <div id="panel-tabs">
        <button class="panel-tab active" onclick="switchTab('emojis')">😊 Emojis</button>
        <button class="panel-tab" onclick="switchTab('gifs')">GIF</button>
      </div>
      <div id="tab-emojis"><emoji-picker></emoji-picker></div>
      <div id="tab-gifs">
        <input type="text" id="gif-search" placeholder="Buscar GIF..." oninput="searchGifs(this.value)" />
        <div id="gif-results"></div>
      </div>
    </div>

    <form onsubmit="addMessage(); return false;">
      <input type="text" id="nickname" placeholder="Nickname" />
      <div id="form-row">
        <button type="button" id="media-btn" onclick="togglePanel(false)">😊</button>
        <textarea id="text" placeholder="Mensaje..."></textarea>
        <input type="submit" value="Enviar" />
      </div>
    </form>

    <div id="secret-overlay">
      <div id="secret-modal">
        <h2>🔒</h2>
        <input type="password" id="secret-password" placeholder="Contraseña" />
        <p id="secret-error"></p>
        <div class="secret-modal-actions">
          <button onclick="submitSecretPassword()">Entrar</button>
          <button onclick="closeSecretModal()">Cancelar</button>
        </div>
      </div>
    </div>

    <div id="secret-chat">
      <div id="secret-header">
        <span>🔐 Chat Secreto</span>
        <button onclick="leaveSecretChat()">✕ Salir</button>
      </div>
      <div id="secret-messages"></div>
      <div id="secret-reply-preview">
        <span id="secret-reply-text"></span>
        <button onclick="cancelSecretReply()">✕</button>
      </div>
      <form onsubmit="addSecretMessage(); return false;">
        <input type="text" id="secret-nickname" placeholder="Nickname" />
        <div id="secret-form-row">
          <button type="button" id="secret-media-btn" onclick="togglePanel(true)">😊</button>
          <textarea id="secret-text" placeholder="Mensaje..."></textarea>
          <input type="submit" value="Enviar" />
        </div>
      </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <script src="main.js"></script>
  </body>
  </html>
